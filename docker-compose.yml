version: '3.8'

services:
  spring-boot-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRADLE_USER_HOME: /gradle-cache  # 传递构建参数
    image: user-passport
    container_name: passport
    environment:
      DB_HOST: test-postgre
      DB_PORT: 5432
      DB_NAME: userpassport
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
    ports:
      - "8082:8080"
    volumes:
      - gradle-cache:/gradle-cache  # 挂载本地缓存目录
    restart: always
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network

volumes:
  gradle-cache:  # 定义持久化卷
    driver: local
